name: Deploy frontend to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: ".nvmrc"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate preview data
        run: npm run export-preview-data --workspace=packages/backend

      - name: Build frontend
        working-directory: packages/frontend
        env:
          VITE_BASE_PATH: /badgehub-app/
          VITE_BADGEHUB_API_BASE_URL: ${{ vars.VITE_BADGEHUB_API_BASE_URL || 'https://api.example.invalid' }}
          VITE_KEYCLOAK_BASE_URL: ${{ vars.VITE_KEYCLOAK_BASE_URL || 'https://auth.example.invalid' }}
          VITE_KEYCLOAK_REALM: ${{ vars.VITE_KEYCLOAK_REALM || 'badgehub' }}
          VITE_KEYCLOAK_CLIENT_ID: ${{ vars.VITE_KEYCLOAK_CLIENT_ID || 'badgehub-frontend' }}
          VITE_BADGE_SLUGS: ${{ vars.VITE_BADGE_SLUGS || 'why2025,troopers23,mch2022' }}
          VITE_CATEGORY_NAMES: ${{ vars.VITE_CATEGORY_NAMES || 'Uncategorised,Event related,Games,Graphics,Hardware,Utility,Wearable,Data,Silly,Hacking,Troll,Unusable,Adult,Virus,SAO,Interpreter' }}
          VITE_ADMIN_CATEGORY_NAMES: ${{ vars.VITE_ADMIN_CATEGORY_NAMES || 'Default' }}
          VITE_ENABLE_BROWSER_BACKEND: "true"
        run: npm run build

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: packages/frontend/dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
